services:
  postgres:
    image: postgres:16-alpine
    container_name: hadir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hadir}
      TZ: Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hadir}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hadir-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hadir-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:***@postgres:5432/${POSTGRES_DB:-hadir}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_NAME: Hadir
      TZ: Asia/Jakarta
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - hadir-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hadir-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - hadir-net

volumes:
  postgres_data:
  backend_uploads:

networks:
  hadir-net:
    driver: bridge
